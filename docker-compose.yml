version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: poc_medical_backend
    ports:
      - "8042:8000"
    environment:
      - OLLAMA_HOST=host.docker.internal
    # If using host's Ollama instance, Docker Desktop must be configured or use network_mode: host (Linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: poc_medical_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: poc_medical_chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./research_archive/chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    restart: unless-stopped
