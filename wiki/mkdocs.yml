            Experiments: Experiments
            "RETEX (briefings + audits)": "RETEX (briefings + audits)"
            Skills Claude: Claude Skills
            Tests: Tests
            Providers: Providers
            Manuscrit: Manuscript
            Glossaire: Glossary
            i18n trilingue: Trilingual i18n
            Contribution: Contributing
