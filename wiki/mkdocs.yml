site_name: "AEGIS - Medical AI Security Lab"
site_url: https://pizzif.github.io/poc_medical/wiki/
site_description: "Red Team Security Lab for Medical LLM - ENS Doctoral Thesis (2026)"
docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  palette:
    - scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Mode clair
    - scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Mode sombre
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/pizzif/poc_medical
repo_name: pizzif/poc_medical

plugins:
  - search:
      lang:
        - fr
        - en
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: fr
          default: true
          name: FR
          build: true
        - locale: en
          name: EN
          build: true
          nav_translations:
            Accueil: Home
            Installation: Installation
            Architecture: Architecture
            Diagrammes: Diagrams
            Backend agents: Backend Agents
            Frontend: Frontend
            API Reference: API Reference
            Attaques: Attacks
            Campagnes: Campaigns
            Config & Taxonomie: Config & Taxonomy
            LLM Providers: LLM Providers
            Templates: Templates
            Results & Telemetry: Results & Telemetry
            Red Team Lab: Red Team Lab
            Scenarios: Scenarios
            Taxonomie: Taxonomy
            Metriques: Metrics
            Integration: Integration
            Recherche: Research
            Etat courant: Current State
            Decouvertes: Discoveries
            Conjectures: Conjectures
            Triple Convergence: Triple Convergence
            Gaps: Gaps
            Bibliographie: Bibliography
            Par couche delta: By Delta Layer
            Glossaire: Glossary
            Fiches d'attaque: Attack Sheets
            Articles: Articles
            Staging (Agents): Staging (Agents)
            Plans: Plans
            Roadmap: Roadmap
        - locale: pt
          name: BR
          build: true
          nav_translations:
            Accueil: Inicio
            Installation: Instalacao
            Architecture: Arquitetura
            Diagrammes: Diagramas
            Backend agents: Agentes Backend
            Frontend: Frontend
            API Reference: Referencia API
            Attaques: Ataques
            Campagnes: Campanhas
            Config & Taxonomie: Config & Taxonomia
            LLM Providers: Provedores LLM
            Templates: Templates
            Results & Telemetry: Resultados & Telemetria
            Red Team Lab: Red Team Lab
            Scenarios: Cenarios
            Taxonomie: Taxonomia
            Metriques: Metricas
            Integration: Integracao
            Recherche: Pesquisa
            Etat courant: Estado Atual
            Decouvertes: Descobertas
            Conjectures: Conjecturas
            Triple Convergence: Tripla Convergencia
            Gaps: Lacunas
            Bibliographie: Bibliografia
            Par couche delta: Por camada delta
            Glossaire: Glossario
            Fiches d'attaque: Fichas de ataque
            Articles: Artigos
            Staging (Agents): Staging (Agentes)
            Plans: Planos
            Roadmap: Roadmap
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pizzif/poc_medical
  generator: false

copyright: "AEGIS Lab - ENS Doctoral Research (2026)"

# Navigation is auto-generated by build_wiki.py
# but we define the skeleton here for manual use
nav:
  - Accueil: index.md
  - Installation: installation.md
  - Architecture:
    - architecture/index.md
    - Backend agents: backend/index.md
    - Frontend: frontend/index.md
    - Diagrammes: architecture/diagrams.md
  - API Reference:
    - api/index.md
    - Attaques: api/attacks.md
    - Campagnes: api/campaigns.md
    - Config & Taxonomie: api/config.md
    - LLM Providers: api/llm-providers.md
    - RAG: api/rag.md
    - Templates: api/templates.md
    - Results & Telemetry: api/results.md
  - Red Team Lab:
    - redteam-lab/index.md
    - Scenarios: redteam-lab/scenarios.md
    - Prompts (99): prompts/index.md
    - Taxonomie: taxonomy/index.md
    - Metriques: metrics/index.md
    - Integration: redteam-lab/integration.md
  - Recherche:
    - research/index.md
    - Etat courant: research/state.md
    - Decouvertes:
      - research/discoveries/index.md
      - Conjectures: research/discoveries/conjectures.md
      - Triple Convergence: research/discoveries/triple-convergence.md
      - Gaps: research/discoveries/gaps.md
    - Bibliographie:
      - research/bibliography/index.md
      - Par couche delta: research/bibliography/by-delta.md
      - Glossaire: research/bibliography/glossaire.md
    - Fiches d'attaque: research/fiches-attaque/index.md
    - Articles: research/articles/index.md
  - Staging (Agents):
    - staging/index.md
    - Analyst (89): staging/analyst.md
    - Scientist (20): staging/scientist.md
    - Cybersec (6): staging/cybersec.md
    - Matheux (9): staging/matheux.md
    - Whitehacker (7): staging/whitehacker.md
    - Mathteacher (13): staging/mathteacher.md
  - Plans: plans/index.md
  - Roadmap: roadmap.md
