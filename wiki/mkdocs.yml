site_name: "AEGIS - Medical AI Security Lab"
site_url: https://pizzif.github.io/poc_medical/wiki/
site_description: "Red Team Security Lab for Medical LLM - ENS Doctoral Thesis (2026)"
docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  palette:
    - scheme: slate
      primary: red
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Mode clair
    - scheme: default
      primary: red
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Mode sombre
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - header.autohide
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    admonition:
      note: material/note-edit
      abstract: material/book-open
      info: material/information
      tip: material/lightbulb-on
      success: material/check-circle
      question: material/help-circle
      warning: material/alert
      failure: material/close-circle
      danger: material/skull
      bug: material/shield-bug
      example: material/test-tube
      quote: material/format-quote-close

extra_css:
  - stylesheets/aegis.css
  - stylesheets/semantic-search.css

extra_javascript:
  - javascripts/semantic-search.js

repo_url: https://github.com/pizzif/poc_medical
repo_name: pizzif/poc_medical

plugins:
  - search:
      lang:
        - fr
        - en
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: fr
          default: true
          name: FR
          build: true
        - locale: en
          name: EN
          build: true
          nav_translations:
            Accueil: Home
            Installation: Installation
            Architecture: Architecture
            Diagrammes: Diagrams
            Backend agents: Backend Agents
            Frontend: Frontend
            API Reference: API Reference
